# the osft config will override default ppo_trainer.yaml

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

trainer:
  enable_train_temperature: false # make tau_t=tau_s or not, default is set them different and tau_t=1
  enable_train_reward: true # logging training rollout reward or not

  # ---------------------------------------------------------------------------
  # Training trajectory source control (on-policy vs off-policy).
  #
  # mode:
  #   on_policy  -> use trajectories generated by the current model each step.
  #   bootstrap  -> initial checkpoint generates trajectories for all of training
  #   iterative  -> chunked off-policy: from current checkpoint, generate the
  #                 next k trajectory batches first, then train on those k
  #                 batches (one-pass) before regenerating from the updated
  #                 checkpoint.
  #   teacher    -> use pre-generated teacher DataProto trajectory files.
  # ---------------------------------------------------------------------------
  data_source:
    mode: on_policy # on_policy | bootstrap | iterative | teacher
    iterative_k: 1 # chunk size for iterative generation
    seed: 1
    # Used only when mode=teacher. Each entry is a glob pattern that resolves to
    # one or more files produced via DataProto.save_to_disk(...).
    teacher_dataproto_globs: []

  # ---------------------------------------------------------------------------
  # Reward processing: controls how raw rewards are turned into per-sample
  # training weights.  Three configurations are supported:
  #
  #   reward_baseline: "none"                        → POS+NEG
  #   reward_baseline: "mean"                        → REINFORCE+Baseline
  #   reward_baseline: "mean" + reward_normalize_std → GRPO
  # ---------------------------------------------------------------------------
  reward_baseline: "none"       # "none" | "mean"
  reward_normalize_std: false   # divide by group std (GRPO when combined with reward_baseline: "mean")
  reward_std_eps: 1.0e-8        # numerical stability term added to std before dividing

  # Options specific to reward_baseline: "none" --------------------------------
  # Keep incorrect rollouts for prompts that still have kept correct samples;
  # actor minimizes NLL on positives and (scaled) negative NLL on negatives.
  enable_negative_sample_training: false
  negative_sample_loss_scale: 1.0 # multiplier on the negated CE objective for negative sequences
  
actor_rollout_ref:
  actor:
    optim:
      lr_warmup_steps: 10
    entropy_coeff: 0
  rollout:
    tensor_model_parallel_size: 1

algorithm:
  adv_estimator: null

ray_init:
  num_cpus: 64
